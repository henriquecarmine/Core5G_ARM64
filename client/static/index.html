<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Core5G_ARM64 — Painel de Controle</title>
<style>
  :root {
    --bg: #16181d;
    --panel: #1e2128;
    --border: #2c3038;
    --text: #e6e6e6;
    --muted: #8a8f98;
    --accent: #e8590c;
    --green: #2f9e44;
    --red: #e03131;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { font-size: 18px; margin: 0; }
  header h1 span { color: var(--accent); }
  #server-host { color: var(--muted); font-size: 13px; }
  main {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 16px;
    padding: 16px 24px;
    height: calc(100vh - 64px);
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }
  .panel h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--muted);
    margin: 0 0 10px 0;
  }
  .group { margin-bottom: 18px; }
  button {
    display: block;
    width: 100%;
    padding: 9px 10px;
    margin-bottom: 6px;
    background: #262a32;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    text-align: left;
    transition: background .15s;
  }
  button:hover:not(:disabled) { background: #313640; border-color: var(--accent); }
  button:disabled { opacity: .4; cursor: not-allowed; }
  button.danger:hover:not(:disabled) { border-color: var(--red); }
  button.primary { border-color: var(--accent); }
  #console-wrap { display: flex; flex-direction: column; min-height: 0; }
  #console-toolbar {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
  }
  #status-pill {
    font-size: 12px; padding: 3px 10px; border-radius: 12px; background: #262a32; color: var(--muted);
  }
  #status-pill.running { background: #4a2f0c; color: #ffb84d; }
  #status-pill.ok { background: #163a1f; color: #69db7c; }
  #status-pill.error { background: #3a1616; color: #ff8787; }
  #clear-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; width: auto; padding: 4px 8px; margin: 0; }
  #output {
    flex: 1;
    background: #0d0e11;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    overflow-y: auto;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px;
    white-space: pre-wrap;
    line-height: 1.5;
  }
</style>
</head>
<body>
<header>
  <h1>Core5G<span>_ARM64</span> — Painel de Controle</h1>
  <div id="server-host">deploy.sh local → core5g-arm64.duckdns.org</div>
</header>
<main>
  <div class="panel">
    <div class="group">
      <h2>Servidor</h2>
      <button data-cmd="bootstrap">Bootstrap (Docker+swap+DuckDNS)</button>
      <button data-cmd="status">Status / Healthcheck</button>
    </div>
    <div class="group">
      <h2>Projeto 1 — Open5GS</h2>
      <button data-cmd="sync">Sync (rsync local → servidor)</button>
      <button class="primary" data-cmd="up-core">Up core</button>
      <button class="primary" data-cmd="up-ran">Up RAN</button>
      <button class="primary" data-cmd="up-all">Up all</button>
      <button class="danger" data-cmd="down-core">Down core</button>
      <button class="danger" data-cmd="down-ran">Down RAN</button>
      <button class="danger" data-cmd="down-all">Down all</button>
    </div>
    <div class="group">
      <h2>Projeto 2 — OAI/FlexRIC</h2>
      <button data-cmd="sync-oai">Sync OAI (~230MB)</button>
    </div>
  </div>

  <div id="console-wrap">
    <div id="console-toolbar">
      <span id="status-pill">ocioso</span>
      <button id="clear-btn">limpar console</button>
    </div>
    <div id="output">Pronto. Clique em um comando à esquerda.</div>
  </div>
</main>
<script>
const output = document.getElementById('output');
const statusPill = document.getElementById('status-pill');
const buttons = document.querySelectorAll('button[data-cmd]');

function setStatus(state, label) {
  statusPill.className = state;
  statusPill.textContent = label;
}

function setRunning(running) {
  buttons.forEach(b => b.disabled = running);
}

async function runCommand(cmd) {
  setRunning(true);
  setStatus('running', 'executando: ' + cmd);
  output.textContent = '';

  try {
    const resp = await fetch('/api/run/' + cmd, { method: 'POST' });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      output.textContent += decoder.decode(value, { stream: true });
      output.scrollTop = output.scrollHeight;
    }
    setStatus('ok', 'concluído: ' + cmd);
  } catch (err) {
    output.textContent += '\n[erro de conexão: ' + err + ']\n';
    setStatus('error', 'erro: ' + cmd);
  } finally {
    setRunning(false);
  }
}

buttons.forEach(b => b.addEventListener('click', () => runCommand(b.dataset.cmd)));
document.getElementById('clear-btn').addEventListener('click', () => { output.textContent = ''; });
</script>
</body>
</html>
