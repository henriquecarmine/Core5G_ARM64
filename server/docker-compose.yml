# Laboratório Open5GS totalmente containerizado com múltiplas UPFs
# Arquitetura: Control Plane (Open5GS) + RAN (UERANSIM) + User Plane (UPF-A, UPF-B, ...)
# Autor: Jonas Augusto Kunzler
# Data: 2025-12-17
#
# Estrutura de configuração conforme padrão Open5GS:
# - Todos os arquivos YAML em configs/open5gs/
# - Cada serviço usa -c /etc/open5gs/<servico>.yaml
# - Múltiplas UPFs: upf-a.yaml, upf-b.yaml, etc.

# Nome do projeto fixado: mantém volumes/redes/containers estáveis
# independente do nome do diretório onde o compose é executado.
name: open5gs-containerized

services:
  # ============================================================================
  # Database
  # ============================================================================
  
  mongodb:
    image: ${MONGODB_IMAGE:-mongo:7.0}
    container_name: open5gs-mongodb-containerized
    hostname: mongodb
    networks:
      net-sbi:
        ipv4_address: 10.10.0.20
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
      - ./configs/webui/mongo-init-admin.js:/docker-entrypoint-initdb.d/02-webui-admin.js:ro
    environment:
      - TZ=America/Recife
      - MONGO_INITDB_DATABASE=open5gs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================================
  # Network Functions do Control Plane (Open5GS)
  # ============================================================================
  
  nrf:
    image: ${OPEN5GS_IMAGE:-gradiant/open5gs:2.7.6}
    container_name: open5gs-nrf-containerized
    hostname: nrf
    entrypoint: ["/entrypoint.sh"]
    command: /opt/open5gs/bin/open5gs-nrfd -c /etc/open5gs/nrf.yaml
    networks:
      net-sbi:
        ipv4_address: 10.10.0.10
    volumes:
      - ./configs/open5gs:/etc/open5gs
      - ./logs/nrf:/var/log/open5gs
    environment:
      - TZ=America/Recife
    user: root
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f open5gs-nrfd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  scp:
    image: ${OPEN5GS_IMAGE:-gradiant/open5gs:2.7.6}
    container_name: open5gs-scp-containerized
    hostname: scp
    entrypoint: ["/entrypoint.sh"]
    command: /opt/open5gs/bin/open5gs-scpd -c /etc/open5gs/scp.yaml
    networks:
      net-sbi:
        ipv4_address: 10.10.0.200
    volumes:
      - ./configs/open5gs:/etc/open5gs
      - ./logs/scp:/var/log/open5gs
    environment:
      - TZ=America/Recife
    depends_on:
      nrf:
        condition: service_healthy
    user: root
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f open5gs-scpd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  amf:
    image: ${OPEN5GS_IMAGE:-gradiant/open5gs:2.7.6}
    container_name: open5gs-amf-containerized
    hostname: amf
    entrypoint: ["/entrypoint.sh"]
    command: /opt/open5gs/bin/open5gs-amfd -c /etc/open5gs/amf.yaml
    networks:
      net-sbi:
        ipv4_address: 10.10.0.11
      net-n2:
        ipv4_address: 10.20.0.11
    volumes:
      - ./configs/open5gs:/etc/open5gs
      - ./logs/amf:/var/log/open5gs
    environment:
      - TZ=America/Recife
    depends_on:
      nrf:
        condition: service_healthy
    user: root
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f open5gs-amfd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  smf:
    image: ${OPEN5GS_IMAGE:-gradiant/open5gs:2.7.6}
    container_name: open5gs-smf-containerized
    hostname: smf
    entrypoint: ["/entrypoint.sh"]
    command: /opt/open5gs/bin/open5gs-smfd -c /etc/open5gs/smf.yaml
    networks:
      net-sbi:
        ipv4_address: 10.10.0.12
      net-n4:
        ipv4_address: 10.40.0.12
    volumes:
      - ./configs/open5gs:/etc/open5gs
      - ./configs/open5gs/freeDiameter:/etc/freeDiameter
      - ./logs/smf:/var/log/open5gs
    environment:
      - TZ=America/Recife
    depends_on:
      nrf:
        condition: service_healthy
    user: root
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f open5gs-smfd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  ausf:
    image: ${OPEN5GS_IMAGE:-gradiant/open5gs:2.7.6}
    container_name: open5gs-ausf-containerized
    hostname: ausf
    entrypoint: ["/entrypoint.sh"]
    command: /opt/open5gs/bin/open5gs-ausfd -c /etc/open5gs/ausf.yaml
    networks:
      net-sbi:
        ipv4_address: 10.10.0.13
    volumes:
      - ./configs/open5gs:/etc/open5gs
      - ./logs/ausf:/var/log/open5gs
    environment:
      - TZ=America/Recife
    depends_on:
      nrf:
        condition: service_healthy
    user: root
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f open5gs-ausfd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  udm:
    image: ${OPEN5GS_IMAGE:-gradiant/open5gs:2.7.6}
    container_name: open5gs-udm-containerized
    hostname: udm
    entrypoint: ["/entrypoint.sh"]
    command: /opt/open5gs/bin/open5gs-udmd -c /etc/open5gs/udm.yaml
    networks:
      net-sbi:
        ipv4_address: 10.10.0.14
    volumes:
      - ./configs/open5gs:/etc/open5gs
      - ./logs/udm:/var/log/open5gs
    environment:
      - TZ=America/Recife
    depends_on:
      nrf:
        condition: service_healthy
    user: root
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f open5gs-udmd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  udr:
    image: ${OPEN5GS_IMAGE:-gradiant/open5gs:2.7.6}
    container_name: open5gs-udr-containerized
    hostname: udr
    entrypoint: []
    command: ["/scripts/init-udr.sh"]
    networks:
      net-sbi:
        ipv4_address: 10.10.0.15
    volumes:
      - ./configs/open5gs:/etc/open5gs
      - ./logs/udr:/var/log/open5gs
      - ./scripts/init-udr.sh:/scripts/init-udr.sh:ro
    environment:
      - TZ=America/Recife
    depends_on:
      nrf:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    user: root
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f open5gs-udrd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  pcf:
    image: ${OPEN5GS_IMAGE:-gradiant/open5gs:2.7.6}
    container_name: open5gs-pcf-containerized
    hostname: pcf
    entrypoint: []
    command: ["/scripts/init-pcf.sh"]
    networks:
      net-sbi:
        ipv4_address: 10.10.0.16
    volumes:
      - ./configs/open5gs:/etc/open5gs
      - ./logs/pcf:/var/log/open5gs
      - ./scripts/init-pcf.sh:/scripts/init-pcf.sh:ro
    environment:
      - TZ=America/Recife
    depends_on:
      nrf:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    user: root
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f open5gs-pcfd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  bsf:
    image: ${OPEN5GS_IMAGE:-gradiant/open5gs:2.7.6}
    container_name: open5gs-bsf-containerized
    hostname: bsf
    entrypoint: ["/entrypoint.sh"]
    command: /opt/open5gs/bin/open5gs-bsfd -c /etc/open5gs/bsf.yaml
    networks:
      net-sbi:
        ipv4_address: 10.10.0.18
    volumes:
      - ./configs/open5gs:/etc/open5gs
      - ./logs/bsf:/var/log/open5gs
    environment:
      - TZ=America/Recife
    depends_on:
      nrf:
        condition: service_healthy
    user: root
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f open5gs-bsfd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  nssf:
    image: ${OPEN5GS_IMAGE:-gradiant/open5gs:2.7.6}
    container_name: open5gs-nssf-containerized
    hostname: nssf
    entrypoint: ["/entrypoint.sh"]
    command: /opt/open5gs/bin/open5gs-nssfd -c /etc/open5gs/nssf.yaml
    networks:
      net-sbi:
        ipv4_address: 10.10.0.17
    volumes:
      - ./configs/open5gs:/etc/open5gs
      - ./logs/nssf:/var/log/open5gs
    environment:
      - TZ=America/Recife
    depends_on:
      nrf:
        condition: service_healthy
    user: root
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f open5gs-nssfd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ============================================================================
  # User Plane Functions (UPF-A e UPF-B para failover/load balancing)
  # ============================================================================
  
  upf-a:
    image: ${OPEN5GS_IMAGE:-gradiant/open5gs:2.7.6}
    container_name: open5gs-upf-containerized-a
    hostname: upf-a
    entrypoint: ["/entrypoint.sh"]
    command: /opt/open5gs/bin/open5gs-upfd -c /etc/open5gs/upf-a.yaml
    privileged: true
    networks:
      net-n3:
        ipv4_address: 10.30.0.21
      net-n4:
        ipv4_address: 10.40.0.21
      net-n6:
        ipv4_address: 10.50.0.21
    volumes:
      - ./configs/open5gs:/etc/open5gs
      - ./logs/upf-a:/var/log/open5gs
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=America/Recife
      - IPV4_TUN_ADDR=10.60.0.1/17
      - IPV6_TUN_ADDR=2001:db8:cafe::1/48
      - IPV4_TUN_SUBNET=10.60.0.0/17
      - ENABLE_NAT=true
    depends_on:
      smf:
        condition: service_started
    user: root
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f open5gs-upfd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  upf-b:
    image: ${OPEN5GS_IMAGE:-gradiant/open5gs:2.7.6}
    container_name: open5gs-upf-containerized-b
    hostname: upf-b
    entrypoint: ["/entrypoint.sh"]
    command: /opt/open5gs/bin/open5gs-upfd -c /etc/open5gs/upf-b.yaml
    privileged: true
    networks:
      net-n3:
        ipv4_address: 10.30.0.22
      net-n4:
        ipv4_address: 10.40.0.22
      net-n6:
        ipv4_address: 10.50.0.22
    volumes:
      - ./configs/open5gs:/etc/open5gs
      - ./logs/upf-b:/var/log/open5gs
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=America/Recife
      - IPV4_TUN_ADDR=10.60.128.1/17
      - IPV6_TUN_ADDR=2001:db8:cafe::1/48
      - IPV4_TUN_SUBNET=10.60.128.0/17
      - ENABLE_NAT=true
    depends_on:
      smf:
        condition: service_started
    user: root
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f open5gs-upfd || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ============================================================================
  # Adicional Network Functions
  # ============================================================================
  
  dn:
    image: ${DN_IMAGE:-alpine:latest}
    container_name: open5gs-dn-containerized
    hostname: dn
    command: >
      sh -c "
        apk add --no-cache iptables iproute2 net-tools tcpdump curl wget iperf3;
        echo 1 > /proc/sys/net/ipv4/ip_forward;
        iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE;
        tail -f /dev/null
      "
    networks:
      net-n6:
        ipv4_address: 10.50.0.100
    privileged: true
    restart: unless-stopped

  webui:
    image: ${WEBUI_IMAGE:-gradiant/open5gs-webui:2.7.6}
    container_name: open5gs-webui-containerized
    hostname: webui
    ports:
      - 9999:9999
    networks:
      net-sbi:
        ipv4_address: 10.10.0.100
    # volumes:
    #   - ./configs/open5gs:/etc/open5gs
    #   - ./logs/webui:/var/log/open5gs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:9999', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    environment:
      - TZ=America/Recife
      - DB_URI=mongodb://mongodb/open5gs
    depends_on:
      nrf:
        condition: service_healthy
      mongodb:
        condition: service_healthy

# ============================================================================
# Redes Docker Bridge com CIDRs específicos
# ============================================================================
networks:
  # Service Based Interface (SBI) - Comunicação entre NFs do control plane
  net-sbi:
    name: open5gs-containerized_net-sbi
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/16
          gateway: 10.10.0.1

  # N2 Interface - NGAP entre gNB e AMF
  net-n2:
    name: open5gs-containerized_net-n2
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/16
          gateway: 10.20.0.1

  # N3 Interface - GTP-U entre gNB e UPF
  net-n3:
    name: open5gs-containerized_net-n3
    driver: bridge
    ipam:
      config:
        - subnet: 10.30.0.0/16
          gateway: 10.30.0.1

  # N4 Interface - PFCP entre SMF e UPF
  net-n4:
    name: open5gs-containerized_net-n4
    driver: bridge
    ipam:
      config:
        - subnet: 10.40.0.0/16
          gateway: 10.40.0.1

  # N6 Interface - Interface entre UPF e Data Network
  net-n6:
    name: open5gs-containerized_net-n6
    driver: bridge
    ipam:
      config:
        - subnet: 10.50.0.0/16
          gateway: 10.50.0.1

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local
